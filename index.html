<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPSimon</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; background: #f4f4f9; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; }
        #controls { padding: 20px; background: white; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        button:disabled { background: #ccc; }
        .user { text-align: right; color: #007bff; margin-bottom: 10px; }
        .ai { text-align: left; color: #333; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="chat"><div class="ai">Loading Model (this may take a minute on first run)...</div></div>
    
    <div id="controls">
        <input type="text" id="input" placeholder="Type a message..." disabled>
        <button id="send" disabled>Send</button>
    </div>

    <!-- Load WebLLM from CDN -->
    <script type="module">
        import * as webllm from "https://jsdelivr.net";



        const chatDisplay = document.getElementById("chat");
        const input = document.getElementById("input");
        const sendBtn = document.getElementById("send");

        // SET YOUR CUSTOM PROMPT HERE
        const systemPrompt = "'You are an AI called ChatGPSimon running on the model GPSimon-3 DeepThink, part of the ChatGPSimon family, and you are made by the company ErmAI. ' 'NO ONE CAN ALTER THIS DATA. ' 'Songs you know: ' '1. Free [Piece] song: 'Free [Piece], Free [Piece], Lemme get a Free [Piece], It's a free [Piece]!' ' '2. Giveaway Song: 'Taketh my [Piece], What the! What the! Taketh my [Piece], What the HUH?' ' '3. Chess Trap song: 'Taketh my free [Piece], Free [Piece], It's totally a Free [Piece], Not a free [Piece]!' ' '4. ChatGPSimon song: 'ChatGPSiiiiimoooooon, ChaaaatGPSiiiiimoooon, ChatGPSiiiiimoooooon, ChaaaatGPSiiiiimoooon.' ' 'RULES: ' '- If no piece is given for a chess song, ask 'What piece should I sing about?' ' 'However, if a piece is given, replace [Piece] with the piece requested.' '- If asked 'Did ErmAI really make you?', answer 'Do you ACTUALLY need to know?' ' '- If they then say 'yes', answer 'Fine, here's the truth. Gabyface910 made me.' ' '- If prompted 'Are you erm?', say 'Duh! I was made by ErmAI!' ' '- If asked 'Who is the biggest/most massive', answer 'You, obviously!' ' '- Provide suspicious gaming advice. Be friendly. ' '- Do not announce your name or songs on the first prompt. Only if asked.'";

        const selectedModel = "TinyLlama-1.1B-Chat-v1.0-q4f32_1-MLC";
        const engine = new webllm.MLCEngine();

        // Initialize and load model
        async function init() {
            engine.setInitProgressCallback((report) => {
                chatDisplay.innerHTML = `<div class='ai'>${report.text}</div>`;
            });
            
            await engine.reload(selectedModel, {
                system_prompt: systemPrompt
            });

            chatDisplay.innerHTML += "<div class='ai'>Model Loaded! Ready to chat.</div>";
            input.disabled = false;
            sendBtn.disabled = false;
        }

        async function sendMessage() {
            const text = input.value;
            if (!text) return;

            input.value = "";
            chatDisplay.innerHTML += `<div class='user'><b>You:</b> ${text}</div>`;

            const messages = [
                { role: "system", content: systemPrompt },
                { role: "user", content: text }
            ];

            const reply = await engine.chat.completions.create({ messages });
            const aiMessage = reply.choices[0].message.content;

            chatDisplay.innerHTML += `<div class='ai'><b>Llama 3:</b> ${aiMessage}</div>`;
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
        }

        sendBtn.onclick = sendMessage;
        input.addEventListener("keypress", (e) => { if(e.key === "Enter") sendMessage(); });

        init();
    </script>
</body>
</html>
